<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>optimizar — tracker</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tracker-style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="tracker-config.js"></script>
  <script src="tracker-auth.js"></script>
</head>
<body class="auth-body">

  <div class="auth-wrapper">
    <div class="glass-container auth-card">

      <div class="auth-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 90" width="44" height="44"
          fill="none" stroke="currentColor" stroke-width="7"
          stroke-linecap="round" stroke-linejoin="round" class="brand-icon">
          <path d="M 20 45 v 20 h 20 v -35"/>
          <circle cx="20" cy="38" r="6"/>
          <circle cx="40" cy="24" r="6"/>
          <path d="M 40 50 l 30 -30"/>
          <path d="M 65 55 l -15 -15"/>
          <circle cx="65" cy="62" r="6"/>
          <path d="M 50 20 h 20 v 20"/>
        </svg>
        <div>
          <h1 class="brand-title">optimizar</h1>
          <p class="brand-sub">tracker de horas y producción</p>
        </div>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label class="input-label" for="email">correo electrónico</label>
          <input type="email" id="email" class="glass-input" placeholder="tu@email.com" required autocomplete="username">
        </div>
        <div class="form-group">
          <label class="input-label" for="password">contraseña</label>
          <input type="password" id="password" class="glass-input" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <div id="login-error" class="auth-error" style="display:none;"></div>
        <button type="submit" class="btn-optimizar btn-full" id="login-btn">ingresar</button>
      </form>

    </div>
  </div>

  <script>
    // Redirigir si ya hay sesión
    const s = getTrackerSession();
    if (s) window.location.href = s.role === 'admin' ? 'tracker-admin.html' : 'tracker-dashboard.html';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('login-error');
      btn.textContent = 'ingresando...';
      btn.disabled = true;
      err.style.display = 'none';

      const res = await trackerLogin(
        document.getElementById('email').value,
        document.getElementById('password').value
      );

      if (res.success) {
        window.location.href = res.role === 'admin' ? 'tracker-admin.html' : 'tracker-dashboard.html';
      } else {
        err.textContent = res.message || 'correo o contraseña incorrectos.';
        err.style.display = 'block';
        btn.textContent = 'ingresar';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
