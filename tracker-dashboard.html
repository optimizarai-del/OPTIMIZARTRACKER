<script>
let session = null, sb = null;
let timerInterval = null, turnoActivo = false;
let uploadedImages = [], currentEntries = [];
let chartInstance = null, calendarData = {};
let currentCalMonth = new Date().getMonth();
let currentCalYear = new Date().getFullYear();
let projects = [];

const TURNO_KEY = 'optimizar_turno_activo';
const DIAS  = ['dom','lun','mar','mi脙漏','jue','vie','s脙隆b'];
const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

// 芒聰聙芒聰聙 INIT 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
(async () => {
  session = await requireTrackerAuth(['user','admin']);
  if (!session) return;
  sb = getSupabase();
  document.getElementById('user-greeting').textContent =
    `hola, ${session.name.split(' ')[0].toLowerCase()} 冒聼聭聥`;

  await loadProjects();
  restaurarTurnoSiExiste();

  document.getElementById('chart-from').addEventListener('change', loadData);
  document.getElementById('chart-to').addEventListener('change', loadData);
  document.getElementById('project-select').addEventListener('change', updateProjectDot);

  const toDate = new Date(), fromDate = new Date();
  fromDate.setDate(fromDate.getDate() - 30);
  document.getElementById('chart-from').value = fromDate.toISOString().split('T')[0];
  document.getElementById('chart-to').value   = toDate.toISOString().split('T')[0];
  loadData();
})();

// 芒聰聙芒聰聙 PROYECTOS 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
async function loadProjects() {
  const { data } = await sb.from('tracker_projects').select('*').eq('active', true).order('created_at');
  projects = data || [];
  const sel = document.getElementById('project-select');
  sel.innerHTML = '';
  projects.forEach(p => {
    const o = document.createElement('option');
    o.value = p.id; o.textContent = p.name; o.dataset.color = p.color;
    sel.appendChild(o);
  });
  updateProjectDot();
}

function updateProjectDot() {
  const sel = document.getElementById('project-select');
  const color = sel.options[sel.selectedIndex]?.dataset?.color || '#94a3b8';
  document.getElementById('project-color-dot').style.background = color;
}

function getSelectedProject() {
  const id = document.getElementById('project-select').value;
  return projects.find(p => p.id === id) || null;
}

function getProjectColor(projectId) {
  return projects.find(p => p.id === projectId)?.color || '#94a3b8';
}

// 芒聰聙芒聰聙 TIMER 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function formatTime(s) {
  return [Math.floor(s/3600), Math.floor((s%3600)/60), s%60]
    .map(n => String(n).padStart(2,'0')).join(':');
}

function tickTimer() {
  const d = JSON.parse(localStorage.getItem(TURNO_KEY) || 'null');
  if (!d) return;
  const t = formatTime(Math.floor((Date.now() - d.startMs) / 1000));
  ['modal-timer','nav-timer','timer-display'].forEach(id => {
    const el = document.getElementById(id); if (el) el.textContent = t;
  });
}

function getSegundosActuales() {
  const d = JSON.parse(localStorage.getItem(TURNO_KEY) || 'null');
  return d ? Math.floor((Date.now() - d.startMs) / 1000) : 0;
}

function getTurnoStart() {
  const d = JSON.parse(localStorage.getItem(TURNO_KEY) || 'null');
  return d ? new Date(d.startMs) : new Date();
}

function guardarEstadoTurno(entries) {
  const d = JSON.parse(localStorage.getItem(TURNO_KEY) || 'null');
  if (!d) return;
  d.entries = entries;
  localStorage.setItem(TURNO_KEY, JSON.stringify(d));
}

// 芒聰聙芒聰聙 RESTAURAR TURNO 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function restaurarTurnoSiExiste() {
  const d = JSON.parse(localStorage.getItem(TURNO_KEY) || 'null');
  if (!d) return;
  turnoActivo = true;
  currentEntries = d.entries || [];

  const project = projects.find(p => p.id === d.projectId);
  activarUITurno(new Date(d.startMs), project);

  const container = document.getElementById('saved-entries-modal');
  currentEntries.forEach(e => {
    const t = new Date(e.timestamp);
    const div = document.createElement('div'); div.className = 'entry-card';
    div.innerHTML = `
      <div class="entry-card-header">
        <span class="entry-time">${t.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}</span>
        <span class="entry-duration">${formatTime(e.elapsedSecs||0)}</span>
      </div>
      <p class="entry-desc">${e.desc||'(sin descripci脙鲁n)'}</p>
      ${e.doubt ? `<div class="entry-doubt">${e.doubt}</div>` : ''}
    `;
    container.appendChild(div);
  });

  timerInterval = setInterval(tickTimer, 1000);
  tickTimer();
}

function activarUITurno(inicio, project) {
  document.getElementById('btn-turno').classList.add('activo');
  document.getElementById('turno-icon').textContent = '芒聫潞';
  document.getElementById('turno-label').textContent = 'turno activo 芒聙聰 ver panel';
  document.getElementById('turno-title').textContent = 'turno en curso';
  document.getElementById('turno-sub').textContent =
    `iniciado a las ${inicio.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}`;
  document.getElementById('nav-timer').style.display = 'block';
  document.getElementById('nav-timer').classList.add('running');
  document.getElementById('timer-display').style.display = 'block';
  document.getElementById('project-selector-wrap').style.display = 'none';

  if (project) {
    document.getElementById('active-project-dot').style.background = project.color;
    document.getElementById('active-project-name').textContent = project.name.toLowerCase();
    document.getElementById('active-project-badge').style.display = 'flex';
    document.getElementById('modal-project-dot').style.background = project.color;
    document.getElementById('modal-project-label').textContent = `proyecto: ${project.name.toLowerCase()}`;
    document.getElementById('modal-project-label').style.color = project.color;
  }
}

// 芒聰聙芒聰聙 INICIAR / ABRIR TURNO 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function handleTurno() {
  if (!turnoActivo) iniciarTurno(); else openModal();
}

function iniciarTurno() {
  const project = getSelectedProject();
  if (!project) { showToast('Seleccion脙隆 un proyecto antes de iniciar', 'error'); return; }

  turnoActivo = true;
  currentEntries = [];
  uploadedImages = [];
  document.getElementById('saved-entries-modal').innerHTML = '';

  const startMs = Date.now();
  localStorage.setItem(TURNO_KEY, JSON.stringify({
    startMs,
    projectId:    project.id,
    projectName:  project.name,
    projectColor: project.color,
    entries: []
  }));

  timerInterval = setInterval(tickTimer, 1000);
  tickTimer();
  activarUITurno(new Date(startMs), project);
  openModal();
}

function openModal() { document.getElementById('modal-turno').style.display = 'flex'; }
function closeModal() { document.getElementById('modal-turno').style.display = 'none'; }

// 芒聰聙芒聰聙 IM脙聛GENES 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function handleFileSelect(e) {
  Array.from(e.target.files).forEach(file => {
    if (file.size > 5*1024*1024) { showToast('Imagen muy grande (m脙隆x 5MB)','error'); return; }
    const reader = new FileReader();
    reader.onload = ev => { uploadedImages.push({file, base64: ev.target.result}); renderPreviews(); };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}

function renderPreviews() {
  const grid = document.getElementById('preview-grid');
  grid.innerHTML = '';
  uploadedImages.forEach((img, i) => {
    const div = document.createElement('div'); div.className = 'preview-img';
    div.innerHTML = `<img src="${img.base64}" alt="preview"><button onclick="removeImage(${i})">芒聹聲</button>`;
    grid.appendChild(div);
  });
}

function removeImage(i) { uploadedImages.splice(i,1); renderPreviews(); }

// 芒聰聙芒聰聙 GUARDAR AVANCE 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
async function saveEntry() {
  const desc = document.getElementById('entry-desc').value.trim();
  if (!desc) { showToast('Describ脙颅 el avance antes de guardar','error'); return; }

  const ahora = new Date();
  const entry = {
    timestamp:   ahora.toISOString(),
    desc,
    doubt:       document.getElementById('entry-doubt').value.trim(),
    images:      uploadedImages.map(i => i.base64),
    elapsedSecs: getSegundosActuales()
  };
  currentEntries.push(entry);
  guardarEstadoTurno(currentEntries);

  const container = document.getElementById('saved-entries-modal');
  const div = document.createElement('div'); div.className = 'entry-card';
  div.innerHTML = `
    <div class="entry-card-header">
      <span class="entry-time">${ahora.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}</span>
      <span class="entry-duration">${formatTime(entry.elapsedSecs)}</span>
    </div>
    <p class="entry-desc">${entry.desc}</p>
    ${entry.doubt ? `<div class="entry-doubt">${entry.doubt}</div>` : ''}
    ${entry.images.length ? `<div class="entry-img-grid">${entry.images.map(s=>`<img src="${s}" onclick="openLightbox('${s}')">`).join('')}</div>` : ''}
  `;
  container.appendChild(div);

  document.getElementById('entry-desc').value = '';
  document.getElementById('entry-doubt').value = '';
  uploadedImages = [];
  renderPreviews();
  showToast('Avance guardado 芒聹聯');
}

// 芒聰聙芒聰聙 FINALIZAR TURNO 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
async function finalizarTurno() {
  clearInterval(timerInterval);
  turnoActivo = false;

  const fin          = new Date();
  const segs         = getSegundosActuales();
  const totalHoras   = segs / 3600;
  const turnoStart   = getTurnoStart();
  const fechaLocal   = turnoStart.toISOString().split('T')[0];
  const turnoData    = JSON.parse(localStorage.getItem(TURNO_KEY) || '{}');

  // Subir im脙隆genes
  const entriesParaGuardar = [];
  for (const entry of currentEntries) {
    const urls = [];
    for (const b64 of entry.images) {
      try {
        const blob = await fetch(b64).then(r=>r.blob());
        const ext  = blob.type.split('/')[1] || 'jpg';
        const name = `${session.userId}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
        const { error } = await sb.storage.from('tracker-captures').upload(name, blob, {contentType: blob.type});
        if (!error) {
          const { data: u } = sb.storage.from('tracker-captures').getPublicUrl(name);
          urls.push(u.publicUrl);
        }
      } catch(e) { urls.push(b64); }
    }
    entriesParaGuardar.push({...entry, images: urls});
  }

  const { error } = await sb.from('tracker_shifts').insert({
    user_id:      session.userId,
    fecha:        fechaLocal,
    inicio:       turnoStart.toISOString(),
    fin:          fin.toISOString(),
    total_segundos: segs,
    total_horas:  Math.round(totalHoras*100)/100,
    entradas:     entriesParaGuardar,
    project_id:   turnoData.projectId   || null,
    project_name: turnoData.projectName || ''
  });

  if (error) {
    console.error(error);
    showToast('Error al guardar. Reintent脙隆.','error');
    turnoActivo = true;
    timerInterval = setInterval(tickTimer, 1000);
    return;
  }

  localStorage.removeItem(TURNO_KEY);

  // Reset UI
  closeModal();
  document.getElementById('btn-turno').classList.remove('activo');
  document.getElementById('turno-icon').textContent  = '芒聳露';
  document.getElementById('turno-label').textContent = 'empezar turno';
  document.getElementById('turno-title').textContent = '脗驴listo para el pr脙鲁ximo turno?';
  document.getElementById('turno-sub').textContent   =
    `脙潞ltimo turno: ${formatTime(segs)} 芒聙聰 ${fin.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}`;
  document.getElementById('nav-timer').style.display = 'none';
  document.getElementById('nav-timer').classList.remove('running');
  document.getElementById('timer-display').style.display = 'none';
  document.getElementById('saved-entries-modal').innerHTML = '';
  document.getElementById('active-project-badge').style.display = 'none';
  document.getElementById('project-selector-wrap').style.display = 'flex';
  currentEntries = [];

  showToast(`Turno finalizado. ${Math.round(totalHoras*100)/100}h registradas 芒聹聯`);
  await loadData();
}

// 芒聰聙芒聰聙 CARGAR DATOS 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
async function loadData() {
  const { data, error } = await sb
    .from('tracker_shifts').select('*')
    .eq('user_id', session.userId).order('fecha');
  if (error) { console.error(error); return; }

  calendarData = {};
  (data||[]).forEach(row => {
    if (!calendarData[row.fecha]) calendarData[row.fecha] = { horas:0, entradas:[], shifts:[] };
    calendarData[row.fecha].horas += row.total_horas;
    calendarData[row.fecha].entradas.push(...(row.entradas||[]));
    calendarData[row.fecha].shifts.push(row);
  });
  renderChart(data||[]);
  renderCalendar();
}

// 芒聰聙芒聰聙 GR脙聛FICO POR PROYECTO 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function renderChart(rows) {
  const from = document.getElementById('chart-from').value;
  const to   = document.getElementById('chart-to').value;
  let filtered = rows;
  if (from) filtered = filtered.filter(r => r.fecha >= from);
  if (to)   filtered = filtered.filter(r => r.fecha <= to);

  const allDates = [...new Set(filtered.map(r=>r.fecha))].sort();
  const labels   = allDates.map(d => { const [,m,day]=d.split('-'); return `${day}/${m}`; });

  // Agrupar por proyecto
  const pmap = {};
  filtered.forEach(row => {
    const pid    = row.project_id || 'libre';
    const pname  = row.project_name || 'Horas libres';
    const pcolor = getProjectColor(row.project_id);
    if (!pmap[pid]) pmap[pid] = { name: pname, color: pcolor, byDate: {} };
    pmap[pid].byDate[row.fecha] = (pmap[pid].byDate[row.fecha]||0) + row.total_horas;
  });

  const datasets = Object.values(pmap).map(info => ({
    label:              info.name,
    data:               allDates.map(d => Math.round((info.byDate[d]||0)*100)/100),
    borderColor:        info.color,
    backgroundColor:    info.color + '33',
    borderWidth:        2.5,
    pointBackgroundColor: info.color,
    pointBorderColor:   '#fff',
    pointBorderWidth:   2,
    pointRadius:        4,
    pointHoverRadius:   7,
    fill:               Object.keys(pmap).length === 1,
    tension:            0.4
  }));

  if (chartInstance) chartInstance.destroy();
  const ctx = document.getElementById('hoursChart').getContext('2d');
  Chart.defaults.color = 'rgba(255,255,255,0.65)';
  Chart.defaults.font.family = "'Poppins', sans-serif";

  chartInstance = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          mode: 'index', intersect: false,
          backgroundColor: 'rgba(15,23,42,0.95)',
          titleColor: '#fff', bodyColor: '#fff',
          borderColor: 'rgba(255,255,255,0.2)', borderWidth: 1, padding: 10,
          callbacks: { label: c => `${c.dataset.label}: ${c.parsed.y}h` }
        }
      },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.05)' } },
        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { callback: v=>v+'h' } }
      },
      interaction: { mode: 'nearest', axis: 'x', intersect: false },
      onClick: (e, els) => { if (els.length>0) openDayDetail(allDates[els[0].index]); }
    }
  });

  // Leyenda
  const legend = document.getElementById('chart-projects-legend');
  legend.innerHTML = '';
  Object.values(pmap).forEach(info => {
    const li = document.createElement('div'); li.className = 'legend-item';
    li.innerHTML = `<div class="legend-dot" style="background:${info.color}"></div><span>${info.name.toLowerCase()}</span>`;
    legend.appendChild(li);
  });
}

// 芒聰聙芒聰聙 CALENDARIO 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function changeMonth(delta) {
  currentCalMonth += delta;
  if (currentCalMonth > 11) { currentCalMonth=0; currentCalYear++; }
  if (currentCalMonth < 0)  { currentCalMonth=11; currentCalYear--; }
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('cal-month-label').textContent = `${MESES[currentCalMonth]} ${currentCalYear}`;
  const grid = document.getElementById('calendar-grid');
  grid.innerHTML = '';
  DIAS.forEach(d => { const h=document.createElement('div'); h.className='cal-header'; h.textContent=d; grid.appendChild(h); });

  const firstDay    = new Date(currentCalYear, currentCalMonth, 1).getDay();
  const daysInMonth = new Date(currentCalYear, currentCalMonth+1, 0).getDate();
  const today       = new Date().toISOString().split('T')[0];

  for (let i=0; i<firstDay; i++) {
    const b=document.createElement('div'); b.className='cal-day empty'; grid.appendChild(b);
  }
  for (let d=1; d<=daysInMonth; d++) {
    const ds = `${currentCalYear}-${String(currentCalMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dd = calendarData[ds];
    const cell = document.createElement('div');
    cell.className = 'cal-day' + (dd?' has-data':'') + (ds===today?' today':'');

    let dots = '';
    if (dd?.shifts) {
      const seen = new Set();
      dd.shifts.forEach(s => {
        const pid = s.project_id || 'libre';
        if (!seen.has(pid)) {
          seen.add(pid);
          dots += `<span style="width:5px;height:5px;border-radius:50%;background:${getProjectColor(s.project_id)};display:inline-block;margin:0 1px;"></span>`;
        }
      });
    }

    cell.innerHTML = `
      <span>${d}</span>
      ${dd ? `<div style="display:flex;justify-content:center;margin-top:1px;">${dots}</div><div class="cal-hours">${Math.round(dd.horas*10)/10}h</div>` : ''}
    `;
    if (dd) cell.onclick = () => openDayDetail(ds);
    grid.appendChild(cell);
  }
}

// 芒聰聙芒聰聙 DETALLE D脙聧A 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function openDayDetail(ds) {
  const data = calendarData[ds];
  if (!data) return;
  const [y,m,d] = ds.split('-');
  document.getElementById('day-detail-title').textContent =
    `${parseInt(d)} de ${MESES[parseInt(m)-1]} ${y}`;

  document.getElementById('day-stats-row').innerHTML = `
    <div class="day-stat"><div class="label">horas totales</div><div class="value">${Math.round(data.horas*100)/100}h</div></div>
    <div class="day-stat"><div class="label">avances registrados</div><div class="value">${data.entradas.length}</div></div>
  `;

  const list = document.getElementById('day-entries-list');
  list.innerHTML = '';

  (data.shifts||[]).forEach(shift => {
    const color = getProjectColor(shift.project_id);
    const pname = shift.project_name || 'Horas libres';

    const header = document.createElement('div');
    header.style.cssText = 'display:flex;align-items:center;gap:8px;margin:14px 0 8px;';
    header.innerHTML = `
      <span style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0;"></span>
      <span style="font-size:0.82rem;font-weight:600;color:${color};">${pname.toLowerCase()}</span>
      <span style="font-size:0.75rem;color:var(--text-secondary);">芒聙聰 ${shift.total_horas}h</span>
    `;
    list.appendChild(header);

    if (!shift.entradas?.length) {
      const p = document.createElement('p');
      p.style.cssText = 'color:var(--text-secondary);font-size:0.82rem;margin-left:18px;';
      p.textContent = 'sin avances registrados en este turno.';
      list.appendChild(p);
    } else {
      shift.entradas.forEach(e => {
        const t = new Date(e.timestamp);
        const div = document.createElement('div');
        div.className = 'entry-card';
        div.style.borderLeft = `3px solid ${color}`;
        div.innerHTML = `
          <div class="entry-card-header">
            <span class="entry-time">${t.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}</span>
            <span class="entry-duration">${formatTime(e.elapsedSecs||0)}</span>
          </div>
          <p class="entry-desc">${e.desc}</p>
          ${e.doubt ? `<div class="entry-doubt">${e.doubt}</div>` : ''}
          ${(e.images||[]).length ? `<div class="entry-img-grid">${e.images.map(s=>`<img src="${s}" onclick="openLightbox('${s}')">`).join('')}</div>` : ''}
        `;
        list.appendChild(div);
      });
    }
  });

  const detail = document.getElementById('day-detail');
  detail.style.display = 'block';
  detail.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
