<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>optimizar — mi tracker</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tracker-style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="tracker-config.js"></script>
  <script src="tracker-auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- NAV -->
<header class="glass-container top-nav">
  <div class="logo-area">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 90" width="36" height="36"
      fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"
      style="color:var(--accent-blue)">
      <path d="M 20 45 v 20 h 20 v -35"/>
      <circle cx="20" cy="38" r="6"/>
      <circle cx="40" cy="24" r="6"/>
      <path d="M 40 50 l 30 -30"/>
      <path d="M 65 55 l -15 -15"/>
      <circle cx="65" cy="62" r="6"/>
      <path d="M 50 20 h 20 v 20"/>
    </svg>
    <div>
      <h1 style="font-size:1.4rem;text-transform:lowercase;letter-spacing:-0.5px;">optimizar tracker</h1>
    </div>
  </div>
  <div class="nav-buttons">
    <span class="nav-timer" id="nav-timer" style="display:none;">00:00:00</span>
    <span id="user-greeting" style="font-size:0.85rem;color:var(--text-secondary);"></span>
    <button onclick="trackerLogout()" class="btn-optimizar" style="padding:8px 18px;font-size:0.85rem;">salir</button>
  </div>
</header>

<div class="tracker-layout">

  <!-- BOTÓN TURNO -->
  <div class="glass-container turno-hero">
    <div class="turno-info">
      <h2 id="turno-title">¿listo para empezar?</h2>
      <p id="turno-sub">presioná el botón para iniciar tu turno y registrar tu actividad</p>
    </div>
    <div class="turno-actions">
      <div id="timer-display" style="font-size:1.8rem;font-weight:800;color:var(--accent-green);font-variant-numeric:tabular-nums;letter-spacing:3px;display:none;">00:00:00</div>
      <button class="btn-turno" id="btn-turno" onclick="handleTurno()">
        <span id="turno-icon">▶</span>
        <span id="turno-label">empezar turno</span>
      </button>
    </div>
  </div>

  <!-- GRÁFICO HORAS -->
  <div class="glass-container chart-section">
    <div class="chart-section-header">
      <h3 style="color:var(--accent-blue);font-size:0.85rem;text-transform:lowercase;letter-spacing:0.05em;">⏱ horas trabajadas por día</h3>
      <div style="display:flex;gap:10px;align-items:center;">
        <input type="date" id="chart-from" class="glass-input" style="width:140px;font-size:0.8rem;padding:6px 10px;">
        <span style="color:var(--text-secondary);font-size:0.8rem;">→</span>
        <input type="date" id="chart-to" class="glass-input" style="width:140px;font-size:0.8rem;padding:6px 10px;">
      </div>
    </div>
    <div class="chart-wrap">
      <canvas id="hoursChart"></canvas>
    </div>
  </div>

  <!-- CALENDARIO -->
  <div class="glass-container calendar-section">
    <div class="calendar-nav">
      <button class="btn-optimizar" style="padding:6px 14px;font-size:0.8rem;" onclick="changeMonth(-1)">← anterior</button>
      <h3 id="cal-month-label"></h3>
      <button class="btn-optimizar" style="padding:6px 14px;font-size:0.8rem;" onclick="changeMonth(1)">siguiente →</button>
    </div>
    <div class="calendar-grid" id="calendar-grid"></div>
  </div>

  <!-- DETALLE DEL DÍA -->
  <div class="glass-container day-detail-card" id="day-detail" style="display:none;">
    <div class="day-detail-header">
      <h3 id="day-detail-title" style="color:var(--accent-blue);"></h3>
      <button onclick="document.getElementById('day-detail').style.display='none'"
        class="btn-optimizar" style="padding:5px 14px;font-size:0.8rem;">✕ cerrar</button>
    </div>
    <div class="day-stat-row" id="day-stats-row"></div>
    <div class="entries-list" id="day-entries-list"></div>
  </div>

</div>

<!-- MODAL TURNO ACTIVO -->
<div id="modal-turno" class="modal-overlay" style="display:none;">
  <div class="glass-container modal-card">
    <div class="modal-header">
      <h3 style="color:var(--accent-green);">● turno en curso</h3>
      <button onclick="closeModal()" class="btn-optimizar" style="padding:6px 14px;font-size:0.85rem;">minimizar ↓</button>
    </div>

    <div class="modal-timer-display" id="modal-timer">00:00:00</div>

    <div style="margin-bottom:14px;">
      <label class="input-label">¿qué estás haciendo ahora? (opcional)</label>
      <textarea id="entry-desc" class="glass-input" rows="3"
        placeholder="describí el avance, tarea o actividad que estás realizando..."></textarea>
    </div>
    <div style="margin-bottom:14px;">
      <label class="input-label">dudas o bloqueos (opcional)</label>
      <textarea id="entry-doubt" class="glass-input" rows="2"
        placeholder="si tenés alguna duda o algo te está bloqueando, escribilo acá..."></textarea>
    </div>

    <div class="upload-area" onclick="document.getElementById('file-input').click()">
      <input type="file" id="file-input" accept="image/*" multiple style="display:none;" onchange="handleFileSelect(event)">
      <div style="font-size:1.5rem;margin-bottom:4px;">📎</div>
      <p style="font-size:0.85rem;">adjuntá capturas de pantalla o imágenes del avance</p>
      <p style="font-size:0.75rem;color:rgba(255,255,255,0.4);">clic para seleccionar · JPG, PNG · máx 5MB c/u</p>
    </div>
    <div class="preview-grid" id="preview-grid"></div>

    <div class="modal-actions">
      <button class="btn-optimizar" onclick="saveEntry()" style="padding:10px 24px;">
        💾 guardar avance
      </button>
      <button class="btn-optimizar btn-danger" onclick="finalizarTurno()" style="padding:10px 24px;">
        ⏹ finalizar turno
      </button>
    </div>

    <div id="saved-entries-modal" style="margin-top:20px;display:flex;flex-direction:column;gap:10px;"></div>
  </div>
</div>

<script>
// ============================================================
// INIT ASYNC
// ============================================================
let session = null;
let sb = null;
let timerInterval = null;
let turnoActivo = false;
let uploadedImages = [];
let currentEntries = [];
let chartInstance = null;
let calendarData = {};
let currentCalMonth = new Date().getMonth();
let currentCalYear = new Date().getFullYear();

// Clave para persistir el turno en localStorage
const TURNO_KEY = 'optimizar_turno_activo';

(async () => {
  session = await requireTrackerAuth(['user', 'admin']);
  if (!session) return;
  sb = getSupabase();
  document.getElementById('user-greeting').textContent =
    `hola, ${session.name.split(' ')[0].toLowerCase()} 👋`;

  // Restaurar turno activo si existía (navegador cerrado / segundo plano)
  restaurarTurnoSiExiste();

  document.getElementById('chart-from').addEventListener('change', () => loadData());
  document.getElementById('chart-to').addEventListener('change', () => loadData());

  const toDate = new Date();
  const fromDate = new Date();
  fromDate.setDate(fromDate.getDate() - 30);
  document.getElementById('chart-from').value = fromDate.toISOString().split('T')[0];
  document.getElementById('chart-to').value = toDate.toISOString().split('T')[0];

  loadData();
})();

// ============================================================
// TIMER — basado en timestamp real, no en contador
// ============================================================
function formatTime(secs) {
  const h = String(Math.floor(secs / 3600)).padStart(2, '0');
  const m = String(Math.floor((secs % 3600) / 60)).padStart(2, '0');
  const s = String(secs % 60).padStart(2, '0');
  return `${h}:${m}:${s}`;
}

// [FIX BUG 1] El timer se calcula siempre desde el timestamp de inicio guardado
// en localStorage, no desde un contador que se pausa en segundo plano.
function tickTimer() {
  const turnoData = JSON.parse(localStorage.getItem(TURNO_KEY) || 'null');
  if (!turnoData) return;
  const segundosTranscurridos = Math.floor((Date.now() - turnoData.startMs) / 1000);
  const t = formatTime(segundosTranscurridos);
  const modalTimer = document.getElementById('modal-timer');
  const navTimer = document.getElementById('nav-timer');
  const timerDisplay = document.getElementById('timer-display');
  if (modalTimer) modalTimer.textContent = t;
  if (navTimer) navTimer.textContent = t;
  if (timerDisplay) timerDisplay.textContent = t;
}

function getSegundosActuales() {
  const turnoData = JSON.parse(localStorage.getItem(TURNO_KEY) || 'null');
  if (!turnoData) return 0;
  return Math.floor((Date.now() - turnoData.startMs) / 1000);
}

function getTurnoStart() {
  const turnoData = JSON.parse(localStorage.getItem(TURNO_KEY) || 'null');
  if (!turnoData) return new Date();
  return new Date(turnoData.startMs);
}

// ============================================================
// PERSISTENCIA DEL TURNO EN LOCALSTORAGE
// ============================================================
function guardarEstadoTurno(entries) {
  const turnoData = JSON.parse(localStorage.getItem(TURNO_KEY) || 'null');
  if (!turnoData) return;
  turnoData.entries = entries;
  localStorage.setItem(TURNO_KEY, JSON.stringify(turnoData));
}

function restaurarTurnoSiExiste() {
  const turnoData = JSON.parse(localStorage.getItem(TURNO_KEY) || 'null');
  if (!turnoData) return;

  // Hay un turno guardado — restaurar estado
  turnoActivo = true;
  currentEntries = turnoData.entries || [];

  const inicio = new Date(turnoData.startMs);
  const horaStr = inicio.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });

  document.getElementById('btn-turno').classList.add('activo');
  document.getElementById('turno-icon').textContent = '⏺';
  document.getElementById('turno-label').textContent = 'turno activo — ver panel';
  document.getElementById('turno-title').textContent = 'turno en curso';
  document.getElementById('turno-sub').textContent = `iniciado a las ${horaStr}`;
  document.getElementById('nav-timer').style.display = 'block';
  document.getElementById('nav-timer').classList.add('running');
  document.getElementById('timer-display').style.display = 'block';

  // Reconstruir entradas guardadas en el modal
  const container = document.getElementById('saved-entries-modal');
  currentEntries.forEach(entry => {
    const t = new Date(entry.timestamp);
    const div = document.createElement('div');
    div.className = 'entry-card';
    div.innerHTML = `
      <div class="entry-card-header">
        <span class="entry-time">${t.toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit'})}</span>
        <span class="entry-duration">${formatTime(entry.elapsedSecs || 0)}</span>
      </div>
      <p class="entry-desc">${entry.desc}</p>
      ${entry.doubt ? `<div class="entry-doubt">${entry.doubt}</div>` : ''}
    `;
    container.appendChild(div);
  });

  // Iniciar el ticker visual
  timerInterval = setInterval(tickTimer, 1000);
  tickTimer(); // render inmediato
}

// ============================================================
// INICIAR / ABRIR TURNO
// ============================================================
function handleTurno() {
  if (!turnoActivo) {
    iniciarTurno();
  } else {
    openModal();
  }
}

function iniciarTurno() {
  turnoActivo = true;
  currentEntries = [];
  uploadedImages = [];
  document.getElementById('saved-entries-modal').innerHTML = '';

  // [FIX BUG 1] Guardar el timestamp de inicio en localStorage
  // Esto persiste aunque se cierre la pestaña o vaya a segundo plano
  const turnoData = {
    startMs: Date.now(),
    entries: []
  };
  localStorage.setItem(TURNO_KEY, JSON.stringify(turnoData));

  timerInterval = setInterval(tickTimer, 1000);
  tickTimer(); // render inmediato sin esperar 1 segundo

  const inicio = new Date(turnoData.startMs);
  const horaStr = inicio.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });

  const btn = document.getElementById('btn-turno');
  btn.classList.add('activo');
  document.getElementById('turno-icon').textContent = '⏺';
  document.getElementById('turno-label').textContent = 'turno activo — ver panel';
  document.getElementById('turno-title').textContent = 'turno en curso';
  document.getElementById('turno-sub').textContent = `iniciado a las ${horaStr}`;
  document.getElementById('nav-timer').style.display = 'block';
  document.getElementById('nav-timer').classList.add('running');
  document.getElementById('timer-display').style.display = 'block';

  openModal();
}

function openModal() {
  document.getElementById('modal-turno').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal-turno').style.display = 'none';
}

// ============================================================
// IMÁGENES
// ============================================================
function handleFileSelect(e) {
  const files = Array.from(e.target.files);
  files.forEach(file => {
    if (file.size > 5 * 1024 * 1024) { showToast('Imagen muy grande (máx 5MB)', 'error'); return; }
    const reader = new FileReader();
    reader.onload = ev => {
      uploadedImages.push({ file, base64: ev.target.result, name: file.name });
      renderPreviews();
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}

function renderPreviews() {
  const grid = document.getElementById('preview-grid');
  grid.innerHTML = '';
  uploadedImages.forEach((img, i) => {
    const div = document.createElement('div');
    div.className = 'preview-img';
    div.innerHTML = `<img src="${img.base64}" alt="preview"><button onclick="removeImage(${i})">✕</button>`;
    grid.appendChild(div);
  });
}

function removeImage(i) {
  uploadedImages.splice(i, 1);
  renderPreviews();
}

// ============================================================
// GUARDAR ENTRADA (avance)
// ============================================================
async function saveEntry() {
  const desc = document.getElementById('entry-desc').value.trim();
  if (!desc) { showToast('Describí el avance antes de guardar', 'error'); return; }

  const ahora = new Date();
  const entry = {
    timestamp: ahora.toISOString(),
    desc,
    doubt: document.getElementById('entry-doubt').value.trim(),
    images: uploadedImages.map(i => i.base64),
    elapsedSecs: getSegundosActuales()
  };

  currentEntries.push(entry);

  // Persistir entradas en localStorage también
  guardarEstadoTurno(currentEntries);

  // Renderizar en modal
  const container = document.getElementById('saved-entries-modal');
  const div = document.createElement('div');
  div.className = 'entry-card';
  div.innerHTML = `
    <div class="entry-card-header">
      <span class="entry-time">${ahora.toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit'})}</span>
      <span class="entry-duration">${formatTime(entry.elapsedSecs)}</span>
    </div>
    <p class="entry-desc">${entry.desc}</p>
    ${entry.doubt ? `<div class="entry-doubt">${entry.doubt}</div>` : ''}
    ${entry.images.length ? `<div class="entry-img-grid">${entry.images.map(s=>`<img src="${s}" onclick="openLightbox('${s}')">`).join('')}</div>` : ''}
  `;
  container.appendChild(div);

  document.getElementById('entry-desc').value = '';
  document.getElementById('entry-doubt').value = '';
  uploadedImages = [];
  renderPreviews();
  showToast('Avance guardado ✓');
}

// ============================================================
// FINALIZAR TURNO
// ============================================================
async function finalizarTurno() {
  // [FIX BUG 2] Ya no se exige tener avances guardados para finalizar
  // El turno se guarda igual con las entradas que tenga (pueden ser 0)

  clearInterval(timerInterval);
  turnoActivo = false;

  const fin = new Date();
  const segundosTotal = getSegundosActuales();
  const totalHoras = segundosTotal / 3600;
  const turnoStart = getTurnoStart();
  const fechaLocal = turnoStart.toISOString().split('T')[0];

  // Subir imágenes a Supabase Storage
  const entriesParaGuardar = [];
  for (const entry of currentEntries) {
    const urls = [];
    for (const b64 of entry.images) {
      try {
        const blob = await fetch(b64).then(r => r.blob());
        const ext = blob.type.split('/')[1] || 'jpg';
        const fileName = `${session.userId}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
        const { data, error } = await sb.storage
          .from('tracker-captures')
          .upload(fileName, blob, { contentType: blob.type });
        if (!error) {
          const { data: urlData } = sb.storage.from('tracker-captures').getPublicUrl(fileName);
          urls.push(urlData.publicUrl);
        }
      } catch(e) {
        urls.push(b64);
      }
    }
    entriesParaGuardar.push({ ...entry, images: urls });
  }

  // Guardar en Supabase
  const { error } = await sb.from('tracker_shifts').insert({
    user_id: session.userId,
    fecha: fechaLocal,
    inicio: turnoStart.toISOString(),
    fin: fin.toISOString(),
    total_segundos: segundosTotal,
    total_horas: Math.round(totalHoras * 100) / 100,
    entradas: entriesParaGuardar
  });

  if (error) {
    console.error(error);
    showToast('Error al guardar. Reintentá.', 'error');
    // Reactivar timer si falla
    turnoActivo = true;
    timerInterval = setInterval(tickTimer, 1000);
    return;
  }

  // Limpiar localStorage del turno
  localStorage.removeItem(TURNO_KEY);

  // Reset UI
  closeModal();
  document.getElementById('btn-turno').classList.remove('activo');
  document.getElementById('turno-icon').textContent = '▶';
  document.getElementById('turno-label').textContent = 'empezar turno';
  document.getElementById('turno-title').textContent = '¿listo para el próximo turno?';
  document.getElementById('turno-sub').textContent =
    `último turno: ${formatTime(segundosTotal)} — ${fin.toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit'})}`;
  document.getElementById('nav-timer').style.display = 'none';
  document.getElementById('nav-timer').classList.remove('running');
  document.getElementById('timer-display').style.display = 'none';
  document.getElementById('saved-entries-modal').innerHTML = '';
  currentEntries = [];

  showToast(`Turno finalizado. ${Math.round(totalHoras * 100) / 100}h registradas ✓`);
  await loadData();
}

// ============================================================
// CARGAR DATOS DE SUPABASE
// ============================================================
async function loadData() {
  const { data, error } = await sb
    .from('tracker_shifts')
    .select('*')
    .eq('user_id', session.userId)
    .order('fecha', { ascending: true });

  if (error) { console.error(error); return; }

  calendarData = {};
  data.forEach(row => {
    if (!calendarData[row.fecha]) calendarData[row.fecha] = { horas: 0, entradas: [] };
    calendarData[row.fecha].horas += row.total_horas;
    calendarData[row.fecha].entradas.push(...(row.entradas || []));
  });

  renderChart(data);
  renderCalendar();
}

// ============================================================
// GRÁFICO
// ============================================================
function renderChart(rows) {
  const byDate = {};
  rows.forEach(r => { byDate[r.fecha] = (byDate[r.fecha] || 0) + r.total_horas; });

  const from = document.getElementById('chart-from').value;
  const to = document.getElementById('chart-to').value;
  let dates = Object.keys(byDate).sort();
  if (from) dates = dates.filter(d => d >= from);
  if (to) dates = dates.filter(d => d <= to);

  const labels = dates.map(d => { const [y,m,day] = d.split('-'); return `${day}/${m}`; });
  const values = dates.map(d => Math.round(byDate[d] * 100) / 100);

  if (chartInstance) chartInstance.destroy();
  const canvas = document.getElementById('hoursChart');
  const ctx = canvas.getContext('2d');
  const gradient = ctx.createLinearGradient(0, 0, 0, 220);
  gradient.addColorStop(0, 'rgba(52,211,153,0.4)');
  gradient.addColorStop(1, 'rgba(52,211,153,0.0)');

  Chart.defaults.color = 'rgba(255,255,255,0.65)';
  Chart.defaults.font.family = "'Poppins', sans-serif";

  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Horas trabajadas', data: values,
        borderColor: '#34d399', backgroundColor: gradient,
        borderWidth: 2.5, pointBackgroundColor: '#34d399',
        pointBorderColor: '#fff', pointBorderWidth: 2,
        pointRadius: 5, pointHoverRadius: 8, fill: true, tension: 0.4
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(15,23,42,0.95)', titleColor: '#fff',
          bodyColor: '#34d399', borderColor: '#34d399', borderWidth: 1, padding: 10,
          callbacks: {
            label: ctx => `${ctx.parsed.y}h trabajadas`,
            afterLabel: ctx => {
              const fecha = dates[ctx.dataIndex];
              const ents = calendarData[fecha]?.entradas?.length || 0;
              return `${ents} avance${ents !== 1 ? 's' : ''} registrado${ents !== 1 ? 's' : ''}`;
            }
          }
        }
      },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.05)' } },
        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { callback: v => v + 'h' } }
      },
      onClick: (e, elements) => { if (elements.length > 0) openDayDetail(dates[elements[0].index]); }
    }
  });
}

// ============================================================
// CALENDARIO
// ============================================================
const DIAS = ['dom','lun','mar','mié','jue','vie','sáb'];
const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

function changeMonth(delta) {
  currentCalMonth += delta;
  if (currentCalMonth > 11) { currentCalMonth = 0; currentCalYear++; }
  if (currentCalMonth < 0) { currentCalMonth = 11; currentCalYear--; }
  renderCalendar();
}

function renderCalendar() {
  const label = document.getElementById('cal-month-label');
  label.textContent = `${MESES[currentCalMonth]} ${currentCalYear}`;
  const grid = document.getElementById('calendar-grid');
  grid.innerHTML = '';
  DIAS.forEach(d => {
    const h = document.createElement('div');
    h.className = 'cal-header'; h.textContent = d;
    grid.appendChild(h);
  });
  const firstDay = new Date(currentCalYear, currentCalMonth, 1).getDay();
  const daysInMonth = new Date(currentCalYear, currentCalMonth + 1, 0).getDate();
  const today = new Date().toISOString().split('T')[0];
  for (let i = 0; i < firstDay; i++) {
    const blank = document.createElement('div');
    blank.className = 'cal-day empty'; grid.appendChild(blank);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${currentCalYear}-${String(currentCalMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayData = calendarData[dateStr];
    const cell = document.createElement('div');
    cell.className = 'cal-day';
    if (dayData) cell.classList.add('has-data');
    if (dateStr === today) cell.classList.add('today');
    cell.innerHTML = `
      <span>${d}</span>
      ${dayData ? `<div class="cal-dot"></div><div class="cal-hours">${Math.round(dayData.horas*10)/10}h</div>` : ''}
    `;
    if (dayData) cell.onclick = () => openDayDetail(dateStr);
    grid.appendChild(cell);
  }
}

// ============================================================
// DETALLE DEL DÍA
// ============================================================
function openDayDetail(dateStr) {
  const data = calendarData[dateStr];
  if (!data) return;
  const [y,m,d] = dateStr.split('-');
  document.getElementById('day-detail-title').textContent =
    `${parseInt(d)} de ${MESES[parseInt(m)-1]} ${y}`;

  document.getElementById('day-stats-row').innerHTML = `
    <div class="day-stat">
      <div class="label">horas totales</div>
      <div class="value">${Math.round(data.horas * 100) / 100}h</div>
    </div>
    <div class="day-stat">
      <div class="label">avances registrados</div>
      <div class="value">${data.entradas.length}</div>
    </div>
  `;

  const list = document.getElementById('day-entries-list');
  list.innerHTML = '';
  if (data.entradas.length === 0) {
    list.innerHTML = '<p style="color:var(--text-secondary);font-size:0.88rem;">sin avances registrados para este día.</p>';
  } else {
    data.entradas.forEach(entry => {
      const t = new Date(entry.timestamp);
      const div = document.createElement('div');
      div.className = 'entry-card';
      div.innerHTML = `
        <div class="entry-card-header">
          <span class="entry-time">${t.toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit'})}</span>
          <span class="entry-duration">${formatTime(entry.elapsedSecs || 0)}</span>
        </div>
        <p class="entry-desc">${entry.desc}</p>
        ${entry.doubt ? `<div class="entry-doubt">${entry.doubt}</div>` : ''}
        ${(entry.images||[]).length
          ? `<div class="entry-img-grid">${entry.images.map(s=>`<img src="${s}" onclick="openLightbox('${s}')">`).join('')}</div>`
          : ''}
      `;
      list.appendChild(div);
    });
  }

  const detail = document.getElementById('day-detail');
  detail.style.display = 'block';
  detail.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
